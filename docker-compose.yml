version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: smartlearn-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-tBYdA6c@S4T9RmW#^ZKR}
      MYSQL_DATABASE: smart_learn
      MYSQL_USER: smartlearn_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-tBYdA6c@S4T9RmW#^ZKR}
    command: >
      --default-authentication-plugin=caching_sha2_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=500
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartlearn-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartlearn-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${DB_URL:-jdbc:mysql://mysql:3306/smart_learn?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: smartlearn_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-tBYdA6c@S4T9RmW#^ZKR}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      MIMO_API_KEY: ${MIMO_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  mysql_data:
  redis_data:
