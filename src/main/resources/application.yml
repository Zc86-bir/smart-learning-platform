server:
  port: 9090
  servlet:
    context-path: /

spring:
  application:
    name: smart-learn-platform

  # OAuth2 Client Configuration
  security:
    oauth2:
      client:
        registration:
          # GitHub OAuth2
          github:
            client-id: ${OAUTH2_GITHUB_CLIENT_ID:}
            client-secret: ${OAUTH2_GITHUB_CLIENT_SECRET:}
            scope: read:user,user:email
          # WeChat (example, needs custom provider)
          wechat:
            client-id: ${OAUTH2_WECHAT_CLIENT_ID:}
            client-secret: ${OAUTH2_WECHAT_CLIENT_SECRET:}
            client-name: 微信登录
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/wechat"
            scope: snsapi_login
        provider:
          wechat:
            authorization-uri: https://open.weixin.qq.com/connect/qrconnect
            token-uri: https://api.weixin.qq.com/sns/oauth2/access_token
            user-info-uri: https://api.weixin.qq.com/sns/userinfo
            user-name-attribute: openid

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/smart_learning?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.smartlearn.platform.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    enable-sql-runner: false

# MiMo AI Configuration
mimo:
  base-url: https://token-plan-cn.xiaomimimo.com/v1
  api-key: ${MIMO_API_KEY:your-api-key-here}
  model: mimo-v2.5
  # Question generation: thinking disabled, higher temperature
  question:
    thinking-type: disabled
    temperature: 0.7
  # Grading: thinking enabled, lower temperature
  grading:
    thinking-type: enabled
    temperature: 0.2
  # Request timeouts
  connect-timeout-seconds: 30
  request-timeout-seconds: 120
  # Retry config for 429
  retry:
    max-attempts: 4
    initial-delay-ms: 1000
    max-delay-ms: 8000

# Logging
logging:
  level:
    com.smartlearn: DEBUG
    com.smartlearn.platform.client.mimo: INFO

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 days
