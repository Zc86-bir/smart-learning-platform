server:
  port: 9090
  servlet:
    context-path: /

spring:
  application:
    name: smart-learn-platform

  # OAuth2 Client Configuration (uncomment and fill in values to enable)
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         github:
  #           client-id: your-github-client-id
  #           client-secret: your-github-client-secret
  #           scope: read:user,user:email

  # Common datasource - overridden by profiles
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/smart_learning?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.smartlearn.platform.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    enable-sql-runner: false

# MiMo AI Configuration
mimo:
  base-url: https://api.xiaomimimo.com/v1
  api-key: ${MIMO_API_KEY:your-api-key-here}
  model: mimo-v2.5
  question:
    thinking-type: disabled
    temperature: 0.7
  grading:
    thinking-type: enabled
    temperature: 0.2
  connect-timeout-seconds: 30
  request-timeout-seconds: 120
  retry:
    max-attempts: 4
    initial-delay-ms: 1000
    max-delay-ms: 8000

# Logging
logging:
  config: classpath:logback-spring.xml

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:Y2hhbmdlLXRoaXMtdG8tYS1sb25nLXNlY3JldC1rZXktaW4tcHJvZHVjdGlvbi1lbnZpcm9ubWVudA==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:*}

# Flyway Database Migration
flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true
  baseline-version: 1
  out-of-order: false
  clean-disabled: true

---
# ==================== Development Profile ====================
spring:
  config:
    activate:
      on-profile: dev

flyway:
  enabled: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.smartlearn.platform: DEBUG
    com.smartlearn.platform.client.mimo: DEBUG
    org.mybatis: DEBUG
    org.springframework.jdbc: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

---
# ==================== Production Profile ====================
spring:
  config:
    activate:
      on-profile: prod

flyway:
  enabled: true
  clean-disabled: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.smartlearn.platform: INFO
    com.smartlearn.platform.client.mimo: INFO
    org.mybatis: WARN
    org.springframework.jdbc: WARN

# Disable Swagger in production
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
