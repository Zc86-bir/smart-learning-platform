# Production Docker Compose
# Deploy: docker compose -f docker-compose.prod.yml up -d

services:
  mysql:
    image: mysql:8.4
    container_name: smartlearn-mysql
    restart: unless-stopped
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: smart_learn
      TZ: Asia/Shanghai
    command: >
      --default-authentication-plugin=caching_sha2_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartlearn-net

  redis:
    image: redis:7-alpine
    container_name: smartlearn-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartlearn-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartlearn-app
    restart: unless-stopped
    ports:
      - "9090:9090"
    env_file:
      - .env.docker
    environment:
      DB_URL: jdbc:mysql://mysql:3306/smart_learn?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DATABASE: 0
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - smartlearn-net

  nginx:
    image: nginx:alpine
    container_name: smartlearn-nginx
    restart: unless-stopped
    ports:
      - "7080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - smartlearn-net

volumes:
  mysql_data:
  redis_data:

networks:
  smartlearn-net:
    driver: bridge
